<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K线回放 - A股分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');}</script>
<style>
:root {
  --bg:#fff; --panel:#f8f9fd; --border:#e0e3eb; --border-l:#f0f2f5;
  --text:#131722; --text2:#787b86; --text3:#b2b5be;
  --accent:#2962ff; --accent-h:#1e53e5; --accent-bg:rgba(41,98,255,.08);
  --up:#ef5350; --dn:#26a69a; --hover:rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif;
  --rp-w:280px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Toolbar ===== */
.toolbar{height:42px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;flex-shrink:0;z-index:10;gap:2px}
.tg{display:flex;align-items:center} .td{width:1px;height:20px;background:var(--border);margin:0 6px;flex-shrink:0}
.tb{height:32px;padding:0 10px;border-radius:6px;background:0;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.tb:hover{background:var(--hover);color:var(--text)} .tb svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.sym-btn{font-size:14px;font-weight:600;color:var(--text);padding:0 12px} .sym-btn .sn{color:var(--text2);font-weight:400;font-size:12px;margin-left:4px}
.fav-btn svg{fill:var(--text3);transition:.15s} .fav-btn:hover svg{fill:#ffc107} .fav-btn.faved svg{fill:#ffc107}
.pi{display:flex;align-items:center;gap:8px;padding:0 8px;font-size:13px} .pi .pr{font-weight:700;font-size:16px} .pi .cg{font-size:12px;font-weight:500}
.pu{color:var(--up)} .pd{color:var(--dn)}
.per{height:28px;padding:0 10px;border-radius:6px;background:0;color:var(--text2);font-size:13px;font-weight:500;transition:.15s}
.per:hover{color:var(--text);background:var(--hover)} .per.act{color:var(--accent);background:var(--accent-bg)}
.ts{flex:1}

/* ===== Main ===== */
.main{flex:1;display:flex;min-height:0}
.chart-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
.chart-area{flex:1;min-height:0;position:relative}
#kc{width:100%;height:100%}
.ohlc-bar{position:absolute;top:6px;left:10px;z-index:5;font-size:11px;display:flex;flex-wrap:wrap;gap:3px 10px;pointer-events:none}
.ohlc-bar span{white-space:nowrap} .ol{color:var(--text2)} .ov{font-weight:600} .ot{color:var(--text);font-weight:700;font-size:12px;margin-right:4px}
.rp-badge{position:absolute;top:6px;right:12px;z-index:5;background:var(--accent);color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;display:none;pointer-events:none}
.rp-badge.show{display:flex;align-items:center;gap:5px} .rp-badge svg{width:12px;height:12px;fill:#fff}
.chart-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:15px;gap:10px;z-index:3}
.chart-hint .hs{font-size:12px;color:#ccc} .chart-hint.hidden{display:none}
.chart-hint kbd{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--panel);font-family:var(--font);font-size:13px;color:var(--text2)}

/* ===== Replay Bar ===== */
.replay-bar{height:52px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.rp-tgl{height:34px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:6px;transition:.15s}
.rp-tgl:hover{border-color:var(--accent);color:var(--accent)} .rp-tgl.on{background:var(--accent);border-color:var(--accent);color:#fff} .rp-tgl.on:hover{background:var(--accent-h)}
.rp-tgl svg{width:15px;height:15px;fill:currentColor}
.rctl{display:flex;align-items:center;gap:4px}
.rb{width:34px;height:34px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;transition:.15s}
.rb:hover{border-color:var(--accent);color:var(--accent)} .rb.playing{background:var(--accent);border-color:var(--accent);color:#fff}
.rb:disabled{opacity:.2;cursor:default} .rb:disabled:hover{border-color:var(--border);color:var(--text2)} .rb svg{width:16px;height:16px;fill:currentColor}
.prg-w{flex:1;display:flex;align-items:center;gap:10px;min-width:120px}
.prg-w input[type=range]{flex:1;height:6px;accent-color:var(--accent);cursor:pointer} .prg-w input[type=range]:disabled{opacity:.3;cursor:default}
.prg-t{font-size:12px;color:var(--text2);white-space:nowrap;min-width:140px}
.spd-sel{height:34px;padding:0 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;outline:none} .spd-sel:disabled{opacity:.3}
.rp-keys{font-size:11px;color:var(--text3);display:flex;gap:12px;margin-left:8px}
.rp-keys kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--font);font-size:10px;color:var(--text2)}

/* ===== Resize Handle ===== */
.resize-handle{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:5;transition:background .15s}
.resize-handle:hover,.resize-handle.dragging{background:var(--accent);opacity:.4}

/* ===== Right Panel ===== */
.right-panel{width:var(--rp-w);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg);overflow:hidden;transition:none}
.right-panel.collapsed{width:0;border-left:none}
.rp-tabs{height:38px;display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-tab{flex:1;font-size:12px;font-weight:600;color:var(--text2);background:0;border-bottom:2px solid transparent;transition:.15s}
.rp-tab:hover{color:var(--text);background:var(--hover)} .rp-tab.act{color:var(--accent);border-bottom-color:var(--accent)}
.rp-body{flex:1;overflow-y:auto}

/* ===== Watchlist ===== */
.wl-hdr{height:34px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-l)}
.wl-hdr span{font-size:11px;color:var(--text3)} .wl-btns{display:flex;gap:2px}
.wi{width:26px;height:26px;border-radius:6px;background:0;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:.12s}
.wi:hover{background:var(--hover);color:var(--accent)}
.wl-item{display:flex;align-items:center;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-l);transition:transform .2s,background .1s;position:relative;overflow:hidden}
.wl-item:hover{background:var(--hover)}
.wl-item.cur{background:var(--accent-bg);border-left:3px solid var(--accent);padding-left:9px}
.wl-inf{flex:1;min-width:0} .wl-c{font-size:12px;font-weight:600} .wl-n{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-p{text-align:right;flex-shrink:0} .wl-l{font-size:12px;font-weight:600} .wl-g{font-size:10px}
/* Swipe-to-delete */
.wl-item-inner{display:flex;align-items:center;width:100%}
.wl-e{padding:24px 12px;text-align:center;color:var(--text3);font-size:11px;line-height:1.8}
/* Watchlist groups */
.wl-groups{display:flex;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border-l);overflow-x:auto;flex-shrink:0}
.wl-groups::-webkit-scrollbar{height:0}
.wl-gp{height:26px;padding:0 10px;border-radius:13px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:500;white-space:nowrap;transition:.15s;position:relative;cursor:pointer;display:inline-flex;align-items:center;flex-shrink:0}
.wl-gp:hover{border-color:var(--accent);color:var(--accent)}
.wl-gp.act{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.wl-gp-add{width:26px;height:26px;border-radius:50%;background:0;border:1px dashed var(--border);color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
.wl-gp-add:hover{border-color:var(--accent);color:var(--accent)}
.wl-gp-x{display:none;margin-left:4px;width:14px;height:14px;border-radius:50%;background:var(--text3);color:#fff;font-size:9px;line-height:14px;text-align:center;cursor:pointer;flex-shrink:0;transition:.12s}
.wl-gp:hover .wl-gp-x{display:inline-block}
.wl-gp-x:hover{background:#ef5350}

/* ===== Detail ===== */
.info-sec{padding:0 12px}
.info-title{font-size:11px;font-weight:600;color:var(--text);padding:10px 0 6px;border-bottom:1px solid var(--border-l)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:11px;border-bottom:1px solid var(--border-l)}
.info-k{color:var(--text2)} .info-v{color:var(--text);font-weight:500}
.info-empty{padding:30px 12px;text-align:center;color:var(--text3);font-size:12px}
.rat-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:10px 0 6px} .rat-bar div{height:100%}
.rat-leg{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:10px;color:var(--text2)} .rat-leg span{display:flex;align-items:center;gap:4px}
.rat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.rat-sum{margin-top:10px;font-size:11px;color:var(--text2);line-height:1.6;padding:8px 10px;background:var(--panel);border-radius:8px}

/* ===== Search Modal ===== */
.sm{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:60px}
.sm.show{display:flex} .sm-bk{position:absolute;inset:0;background:rgba(0,0,0,.18)}
.sm-d{position:relative;width:460px;max-height:450px;background:var(--bg);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.1)}
.sm-iw{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px}
.sm-iw svg{width:18px;height:18px;fill:var(--text3);flex-shrink:0}
.sm-i{flex:1;background:0;border:0;outline:0;color:var(--text);font-size:15px;font-family:var(--font)} .sm-i::placeholder{color:var(--text3)}
.sm-r{flex:1;overflow-y:auto}
.sm-sec{padding:8px 16px 4px;font-size:10px;color:var(--text3);letter-spacing:.5px}
.si{display:flex;align-items:center;padding:8px 16px;cursor:pointer;transition:.1s} .si:hover,.si.fc{background:var(--hover)}
.si .c{font-size:14px;font-weight:600;color:var(--text);min-width:70px} .si .n{font-size:13px;color:var(--text2);flex:1}
.si .m{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent-bg);color:var(--accent);font-weight:500}

.ld{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:50;transform-origin:left;animation:lp 1.2s ease-in-out infinite;display:none}
.ld.show{display:block}@keyframes lp{0%{transform:scaleX(0)}50%{transform:scaleX(.6)}100%{transform:scaleX(1);opacity:0}}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tg"><button class="tb sym-btn" id="symBtn" title="搜索 (/)"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span id="sc">搜索股票</span><span class="sn" id="sn"></span></button></div>
  <div class="td"></div>
  <div class="tg pi" id="pi" style="display:none"><span class="pr" id="cp">--</span><span class="cg" id="cc">--</span></div>
  <div class="td" id="pd2" style="display:none"></div>
  <div class="tg" id="pg"><button class="per act" data-k="101">日K</button><button class="per" data-k="102">周K</button><button class="per" data-k="103">月K</button></div>
  <div class="ts"></div>
  <div class="tg">
    <button class="tb fav-btn" id="bFav" title="收藏" style="display:none"><svg viewBox="0 0 24 24" style="width:16px;height:16px"><path id="favIc" d="M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z"/></svg></button>
    <div class="td" id="favTd" style="display:none"></div>
    <button class="tb" id="bLt" title="跳到最新"><svg viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M5.59 7.41L10.18 12l-4.59 4.59L7 18l6-6-6-6zM16 6h2v12h-2z"/></svg>最新</button>
    <div class="td"></div>
    <button class="tb" id="bRp" title="展开/收起右侧面板"><svg viewBox="0 0 24 24" style="width:14px;height:14px"><path d="M3 13h2v-2H3v2zm0 4h2v-2H3v2zm0-8h2V7H3v2zm4 4h14v-2H7v2zm0 4h14v-2H7v2zM7 7v2h14V7H7z"/></svg></button>
    <button class="tb" id="bFs" title="全屏 (F)"><svg viewBox="0 0 24 24" style="width:13px;height:13px"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg></button>
  </div>
</div>

<div class="ld" id="ldBar"></div>

<div class="main">
  <div class="chart-wrap">
    <div class="chart-area">
      <div class="ohlc-bar" id="ohlc"></div>
      <div class="rp-badge" id="rpBdg"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>回放中</div>
      <div id="kc"></div>
      <div class="chart-hint" id="chHint">
        <svg viewBox="0 0 24 24" style="width:44px;height:44px;fill:var(--border)"><path d="M3.5 18.49l6-6.01 4 4L22 6.92l-1.41-1.41-7.09 7.97-4-4L2 16.99z"/></svg>
        按 <kbd>/</kbd> 搜索股票开始<div class="hs">支持代码或名称 · 如 000001、平安银行</div>
      </div>
    </div>
  </div>
  <div class="resize-handle" id="resizeH"></div>
  <div class="right-panel" id="rightPanel">
    <div class="rp-tabs"><button class="rp-tab act" data-t="wl">自选股</button><button class="rp-tab" data-t="info">概况</button><button class="rp-tab" data-t="inst">机构</button></div>
    <div class="rp-body" id="rpBody"></div>
  </div>
</div>

<div class="replay-bar">
  <button class="rp-tgl" id="rpTgl"><svg viewBox="0 0 24 24"><path d="M12 5V1L7 6l5 5V7c3.31 0 6 2.69 6 6s-2.69 6-6 6-6-2.69-6-6H4c0 4.42 3.58 8 8 8s8-3.58 8-8-3.58-8-8-8z"/></svg>回放</button>
  <div class="td"></div>
  <div class="rctl">
    <button class="rb" id="bPv" disabled><svg viewBox="0 0 24 24"><path d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg></button>
    <button class="rb" id="bPl" disabled><svg viewBox="0 0 24 24" id="plIc"><path d="M8 5v14l11-7z"/></svg></button>
    <button class="rb" id="bNx" disabled><svg viewBox="0 0 24 24"><path d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg></button>
  </div>

  <select class="spd-sel" id="spd" disabled><option value="2000">0.5x</option><option value="1000" selected>1x</option><option value="500">2x</option><option value="250">4x</option><option value="100">10x</option></select>
  <div class="rp-keys"><span><kbd>Space</kbd> 播放</span><span><kbd>←</kbd><kbd>→</kbd> 逐根</span><span><kbd>Esc</kbd> 退出</span></div>
</div>

<div class="sm" id="sMod"><div class="sm-bk" id="sBk"></div><div class="sm-d"><div class="sm-iw"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><input class="sm-i" id="sInp" placeholder="输入股票代码或名称..." autocomplete="off"></div><div class="sm-r" id="sRes"><div class="sm-sec" id="rcT" style="display:none">最近搜索</div><div id="rcL"></div><div class="sm-sec" id="rsT" style="display:none">搜索结果</div><div id="rsL"></div></div></div></div>

<script>
(function(){
'use strict';

const PAD_RIGHT = 40; // 右侧空白填充根数，让K线不贴右边

let chart=null, fullData=[], padData=[], visibleLen=0, playing=false, playTm=null, playSpd=1000;
let curStock=null, curKlt='101', sTm=null, rpMode=false;
let wlGroups={}, wlGroupNames=[], activeWlGroup='自选股';
let recent=[], sFocIdx=-1, detail=null, curTab='wl';
let savedZoom=null;
// ===== 周期数据缓存（新增）=====
let cachedDailyData=[]; // 缓存的日线数据
let periodDataCache={}; // 各周期数据缓存: {'101': [...], '102': [...], '103': [...]}
let switchPeriodWithoutReload=false; // 是否启用无刷新切换
let dailyVisibleLen=0; // 专门记录日线索引，回放模式下保持不变

const $=id=>document.getElementById(id);

// ===== Utils =====
let jc=0;
function jsonp(url){return new Promise((ok,no)=>{
  const cb='__k'+(++jc)+'_'+Date.now();
  const s=document.createElement('script');
  const cl=()=>{try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);};
  window[cb]=d=>{cl();ok(d)};
  s.onerror=()=>{cl();no(new Error('请求失败'))};
  let sep=url.includes('?')?'&':'?';
  s.src=url+sep+'cb='+cb;
  document.head.appendChild(s);
  let to=setTimeout(()=>{cl();no(new Error('超时'))},12000);
})}
function fV(v){if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(0)+'万';return v+'';}
function fA(v){if(v>=1e8)return(v/1e8).toFixed(2)+'亿';if(v>=1e4)return(v/1e4).toFixed(2)+'万';return v.toFixed(0);}
function fC(v){return v>=1e8?(v/1e8).toFixed(0)+'亿':fA(v);}
let tTm;function toast(m){$('tst').textContent=m;$('tst').classList.add('show');clearTimeout(tTm);tTm=setTimeout(()=>$('tst').classList.remove('show'),2500);}
function ld(v){$('ldBar').classList.toggle('show',v);}

// ===== 周期合成函数（新增）=====
// 解析日期字符串为Date对象
function parseDateStr(s){
  if(s.includes('-')){
    const [y,m,d]=s.split('-').map(Number);
    return new Date(y,m-1,d);
  }
  const y=+s.substring(0,4),m=+s.substring(4,6)-1,d=+s.substring(6,8);
  return new Date(y,m,d);
}
// 判断是否为同一周（周一为一周开始）
function isSameWeek(d1,d2){
  const getMonday=(d)=>{
    const dt=new Date(d);
    const day=dt.getDay();
    const diff=dt.getDate()-day+(day===0?-6:1);
    dt.setDate(diff);
    dt.setHours(0,0,0,0);
    return dt;
  };
  return getMonday(d1).getTime()===getMonday(d2).getTime();
}
// 判断是否为同一月
function isSameMonth(d1,d2){
  return d1.getFullYear()===d2.getFullYear() && d1.getMonth()===d2.getMonth();
}
// 从日线数据合成周K
function synthesizeWeeklyFromDaily(daily, upToDate){
  if(!daily||!daily.length)return [];
  const result=[];
  let currentWeek=null, weekOpen=null, weekHigh=-Infinity, weekLow=Infinity, weekClose=null;
  let weekVol=0, weekAmt=0, weekFirstDate=null, weekLastDate=null, prevClose=null;
  const upTo=upToDate?parseDateStr(upToDate):null;
  for(let i=0;i<daily.length;i++){
    const d=daily[i];
    const dt=parseDateStr(d.date);
    if(upTo && dt>upTo)break;
    if(!currentWeek||!isSameWeek(dt,currentWeek)){
      if(currentWeek!==null){
        const baseClose=prevClose||weekOpen;
        result.push({date:weekLastDate,open:weekOpen,close:weekClose,high:weekHigh,low:weekLow,vol:weekVol,amt:weekAmt,chg:((weekClose-baseClose)/baseClose*100),chgA:(weekClose-baseClose).toFixed(2),turn:''});
        prevClose=weekClose;
      }
      currentWeek=new Date(dt);
      weekOpen=d.open; weekHigh=d.high; weekLow=d.low; weekClose=d.close;
      weekVol=d.vol; weekAmt=d.amt; weekFirstDate=d.date; weekLastDate=d.date;
    }else{
      weekHigh=Math.max(weekHigh,d.high); weekLow=Math.min(weekLow,d.low); weekClose=d.close;
      weekVol+=d.vol; weekAmt+=d.amt; weekLastDate=d.date;
    }
  }
  if(currentWeek!==null){
    const baseClose=prevClose||weekOpen;
    result.push({date:weekLastDate,open:weekOpen,close:weekClose,high:weekHigh,low:weekLow,vol:weekVol,amt:weekAmt,chg:((weekClose-baseClose)/baseClose*100),chgA:(weekClose-baseClose).toFixed(2),turn:''});
  }
  return result;
}
// 从日线数据合成月K
function synthesizeMonthlyFromDaily(daily, upToDate){
  if(!daily||!daily.length)return [];
  const result=[];
  let currentMonth=null, monthOpen=null, monthHigh=-Infinity, monthLow=Infinity, monthClose=null;
  let monthVol=0, monthAmt=0, monthFirstDate=null, monthLastDate=null, prevClose=null;
  const upTo=upToDate?parseDateStr(upToDate):null;
  for(let i=0;i<daily.length;i++){
    const d=daily[i];
    const dt=parseDateStr(d.date);
    if(upTo && dt>upTo)break;
    if(!currentMonth||!isSameMonth(dt,currentMonth)){
      if(currentMonth!==null){
        const baseClose=prevClose||monthOpen;
        result.push({date:monthLastDate,open:monthOpen,close:monthClose,high:monthHigh,low:monthLow,vol:monthVol,amt:monthAmt,chg:((monthClose-baseClose)/baseClose*100),chgA:(monthClose-baseClose).toFixed(2),turn:''});
        prevClose=monthClose;
      }
      currentMonth=new Date(dt);
      monthOpen=d.open; monthHigh=d.high; monthLow=d.low; monthClose=d.close;
      monthVol=d.vol; monthAmt=d.amt; monthFirstDate=d.date; monthLastDate=d.date;
    }else{
      monthHigh=Math.max(monthHigh,d.high); monthLow=Math.min(monthLow,d.low); monthClose=d.close;
      monthVol+=d.vol; monthAmt+=d.amt; monthLastDate=d.date;
    }
  }
  if(currentMonth!==null){
    const baseClose=prevClose||monthOpen;
    result.push({date:monthLastDate,open:monthOpen,close:monthClose,high:monthHigh,low:monthLow,vol:monthVol,amt:monthAmt,chg:((monthClose-baseClose)/baseClose*100),chgA:(monthClose-baseClose).toFixed(2),turn:''});
  }
  return result;
}
// 找到目标日期在数据中的最近索引
function findClosestDateIndex(targetDate, data){
  if(!targetDate||!data||!data.length)return data.length-1;
  const target=parseDateStr(targetDate);
  let bestIdx=data.length-1, bestDiff=Infinity;
  for(let i=0;i<data.length;i++){
    const d=parseDateStr(data[i].date);
    if(d<=target){
      const diff=target.getTime()-d.getTime();
      if(diff<bestDiff){bestDiff=diff;bestIdx=i;}
    }
  }
  return bestIdx;
}
// 获取截止到指定日线索引的合成数据
function getPeriodDataWithVisibleLen(klt, dailyLen){
  const safeVisibleLen=Math.max(1, Math.min(dailyLen||dailyVisibleLen||cachedDailyData.length, cachedDailyData.length));
  if(klt==='101'){
    return cachedDailyData.slice(0, safeVisibleLen);
  }
  const upToDate=safeVisibleLen>0 && cachedDailyData.length?cachedDailyData[safeVisibleLen-1].date:null;
  if(klt==='102'){
    return synthesizeWeeklyFromDaily(cachedDailyData, upToDate);
  }
  if(klt==='103'){
    return synthesizeMonthlyFromDaily(cachedDailyData, upToDate);
  }
  return cachedDailyData.slice(0, safeVisibleLen);
}

async function checkBackend(){

  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),2000);
    const res=await fetch(BACKEND_URL+'/api/health',{signal:controller.signal});
    clearTimeout(timeout);
    if(res.ok){
      backendAvailable=true;

    }
  }catch(e){}
  backendAvailable=false;
  console.log('✗ 本地后端不可用，使用东方财富API');
  return false;
}

// 兼容不同callback参数名的jsonp
function jsonpWithCallbackParam(url, callbackParam='cb'){
  return new Promise((ok,no)=>{
    const cb='__k'+(++jc)+'_'+Date.now();
    const s=document.createElement('script');
    const cl=()=>{try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);};
    window[cb]=d=>{cl();ok(d)};
    s.onerror=()=>{cl();no(new Error('请求失败'))};
    let sep=url.includes('?')?'&':'?';
    s.src=url+sep+callbackParam+'='+cb;
    document.head.appendChild(s);
    let to=setTimeout(()=>{cl();no(new Error('超时'))},12000);
  });
}

// 多主机尝试jsonp
async function tryJsonp(hosts, pathFn, callbackParam='cb'){
  const key=hosts[0];
  const sorted=[...hosts];
  if(lastOkHost[key]&&sorted.indexOf(lastOkHost[key])>0){
    sorted.splice(sorted.indexOf(lastOkHost[key]),1);
    sorted.unshift(lastOkHost[key]);
  }
  for(let i=0;i<sorted.length;i++){
    const url='https://'+sorted[i]+pathFn();
    console.log('请求:', sorted[i], url);
    try{
      const d=await jsonpWithCallbackParam(url, callbackParam);
      lastOkHost[key]=sorted[i];
      console.log('成功:', sorted[i]);
      return d;
    }catch(e){
      console.warn('失败:', sorted[i], e.message);
      if(i<sorted.length-1)await new Promise(r=>setTimeout(r,200));
    }
  }
  return null;
}

function initChart(){

      {name:'V',type:'bar',xAxisIndex:1,yAxisIndex:1,data:pd.vols,itemStyle:{color:p=>{const d=fullData[p.dataIndex];return d&&d.close>=d.open?'rgba(239,83,80,.35)':'rgba(38,166,154,.35)';}},barMinWidth:Math.max(2,barMinW-1),barMaxWidth:Math.max(20,barMaxW-2)}

function maC(d,n,len){const r=[];for(let i=0;i<len;i++){if(i<n-1){r.push(null);continue;}let s=0;for(let j=0;j<n;j++)s+=d[i-j].close;r.push(+(s/n).toFixed(2));}return r;}

function onMM(p){
  if(!fullData.length)return;
  const dl=rpMode?visibleLen:fullData.length;
  let i=p.dataIndex;if(i==null||i<0||i>=dl)return;
  updOHLC(fullData[i]);
}
function updOHLC(d){
  if(!d)return;const up=d.close>=d.open,c=up?'var(--up)':'var(--dn)';
  const pn=curKlt==='101'?'日K':curKlt==='102'?'周K':'月K';
  $('ohlc').innerHTML=`<span class="ot">${curStock?curStock.name:''} ${pn}</span><span><span class="ol">开 </span><span class="ov" style="color:${c}">${d.open.toFixed(2)}</span></span><span><span class="ol">高 </span><span class="ov" style="color:${c}">${d.high.toFixed(2)}</span></span><span><span class="ol">低 </span><span class="ov" style="color:${c}">${d.low.toFixed(2)}</span></span><span><span class="ol">收 </span><span class="ov" style="color:${c}">${d.close.toFixed(2)}</span></span><span><span class="ov" style="color:${c}">${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</span></span><span><span class="ol">量 </span><span class="ov" style="color:var(--text2)">${fV(d.vol)}</span></span>`;
}
function onDbl(p){if(!fullData.length)return;const i=p.dataIndex;if(i==null||i<0||i>=fullData.length)return;const z=chart.getOption().dataZoom[0];savedZoom={start:z.start,end:z.end};enterRp(i+1);toast('从 '+fullData[i].date+' 开始回放');}

// ===== Replay =====
function setRpBtns(v){$('bPl').disabled=!v;$('bPv').disabled=!v;$('bNx').disabled=!v;$('prg').disabled=!v;$('spd').disabled=!v;}
function enterRp(si){
  rpMode=true;$('rpTgl').classList.add('on');$('rpBdg').classList.add('show');setRpBtns(true);
  visibleLen=si||Math.min(60,fullData.length);
  if(visibleLen>fullData.length)visibleLen=fullData.length;
  // 初始化dailyVisibleLen：找到当前日期对应的日线位置
  if(fullData.length && cachedDailyData.length){
    const currentDate=fullData[visibleLen-1].date;
    const dailyIdx=findClosestDateIndex(currentDate, cachedDailyData);
    dailyVisibleLen=dailyIdx+1;
  }else{
    dailyVisibleLen=visibleLen;
  }
  updPrg();
  if(!savedZoom){
    const totalLen=visibleLen+PAD_RIGHT;
    const vis=Math.min(100,visibleLen);
    savedZoom={start:Math.max(0,((visibleLen-vis)/totalLen)*100),end:((visibleLen+PAD_RIGHT*0.25)/totalLen)*100};
  }
  renderC(visibleLen,false);
  if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
}
function exitRp(){stopP();rpMode=false;$('rpTgl').classList.remove('on');$('rpBdg').classList.remove('show');setRpBtns(false);}
function showAll(){exitRp();visibleLen=fullData.length;savedZoom=null;renderC(fullData.length,true);if(fullData.length)updOHLC(fullData[fullData.length-1]);updPrg();}
function stepF(){
  if(visibleLen>=fullData.length){stopP();return;}
  // 更新visibleLen（当前周期索引）
  visibleLen++;
  // 更新dailyVisibleLen（日线索引）
  if(curKlt==='101'){
    // 日线模式，同步增加
    dailyVisibleLen=visibleLen;
  }else{
    // 周/月线模式：找到下一根K线的最后一个交易日在日线中的位置
    if(visibleLen<=fullData.length && cachedDailyData.length){
      const nextDate=fullData[visibleLen-1].date;
      const dailyIdx=findClosestDateIndex(nextDate, cachedDailyData);
      dailyVisibleLen=dailyIdx+1;
    }
  }
  updPrg();
  // 智能滚动: 检查最新K线是否快到视口右边缘
  if(savedZoom){
    const totalLen=visibleLen+PAD_RIGHT;
    const lastPct=(visibleLen/totalLen)*100;
    // 如果最新K线超过当前视口end的90%位置,向右平移
    const viewRange=savedZoom.end-savedZoom.start;
    const threshold=savedZoom.start+viewRange*0.88;
    if(lastPct>threshold){
      const shift=(1/totalLen)*100;
      savedZoom.start+=shift;savedZoom.end+=shift;
    }
  }
  renderC(visibleLen,false);
  if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
}
function stepB(){
  if(visibleLen<=1)return;
  // 更新visibleLen（当前周期索引）
  visibleLen--;
  // 更新dailyVisibleLen（日线索引）
  if(curKlt==='101'){
    // 日线模式，同步减少
    dailyVisibleLen=visibleLen;
  }else{
    // 周/月线模式：找到前一根K线的最后一个交易日在日线中的位置
    if(visibleLen>=1 && cachedDailyData.length){
      const prevDate=fullData[visibleLen-1].date;
      const dailyIdx=findClosestDateIndex(prevDate, cachedDailyData);
      dailyVisibleLen=dailyIdx+1;
    }
  }
  updPrg();
  renderC(visibleLen,false);
  if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
}
function startP(){if(!rpMode)return;if(visibleLen>=fullData.length)enterRp(Math.min(60,fullData.length));playing=true;$('bPl').classList.add('playing');$('plIc').innerHTML='<path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>';tick();}
function stopP(){playing=false;clearTimeout(playTm);$('bPl').classList.remove('playing');$('plIc').innerHTML='<path d="M8 5v14l11-7z"/>';}
function tick(){if(!playing)return;stepF();if(visibleLen<fullData.length)playTm=setTimeout(tick,playSpd);else{stopP();toast('回放完成');}}
function updPrg(){const t=fullData.length;$('prg').max=t;$('prg').value=visibleLen;if(rpMode&&t){const d=fullData[Math.min(visibleLen,t)-1];$('pLbl').textContent=(d?d.date:'')+' · '+visibleLen+'/'+t;}else $('pLbl').textContent=t?'共 '+t+' 根K线':'就绪';}

// ===== Favorite Toggle =====
function isInWl(){if(!curStock)return false;return(wlGroups[activeWlGroup]||[]).some(s=>s.code===curStock.code);}
function updFavBtn(){const btn=$('bFav'),td=$('favTd'),ic=$('favIc');if(!btn||!td)return;if(!curStock){btn.style.display='none';td.style.display='none';return;}btn.style.display='';td.style.display='';const inWl=isInWl();btn.classList.toggle('faved',inWl);btn.title=inWl?'取消收藏':'收藏到 '+activeWlGroup;if(ic)ic.setAttribute('d',inWl?'M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z':'M22 9.24l-7.19-.62L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21 12 17.27 18.18 21l-1.63-7.03L22 9.24zM12 15.4l-3.76 2.27 1-4.28-3.32-2.88 4.38-.38L12 6.1l1.71 4.04 4.38.38-3.32 2.88 1 4.28L12 15.4z');}
function toggleFav(){if(!curStock){toast('请先搜索股票');return;}const grp=wlGroups[activeWlGroup]||(wlGroups[activeWlGroup]=[]);const idx=grp.findIndex(s=>s.code===curStock.code);if(idx>=0){grp.splice(idx,1);toast(curStock.name+' 已取消收藏');}else{const L=fullData.length?fullData[fullData.length-1]:null;grp.push({code:curStock.code,name:curStock.name,secid:curStock.secid,mkt:curStock.mkt,lp:L?L.close:null,chg:L?L.chg:null});toast(curStock.name+' 已加入 '+activeWlGroup);}saveWl();updFavBtn();if(curTab==='wl')renderWl();}
async function refWl(){
  const grp=wlGroups[activeWlGroup]||[];
  for(const s of grp){
    const sinaData=await fetchSinaKline(s);
    if(sinaData&&sinaData.length){
      const last=sinaData[sinaData.length-1];
      const prev=sinaData.length>1?sinaData[sinaData.length-2]:last;
      s.lp=parseFloat(last.close);
      s.chg=((parseFloat(last.close)-parseFloat(prev.close))/parseFloat(prev.close)*100);
    }
    await new Promise(r=>setTimeout(r,100));
  }
  saveWl();
  if(curTab==='wl')renderWl();
}

// ===== Resize Handle =====
(function(){
  const handle=$('resizeH'),panel=$('rightPanel');
  let dragging=false,startX=0,startW=0;
  handle.addEventListener('mousedown',e=>{
    dragging=true;startX=e.clientX;startW=panel.offsetWidth;
    handle.classList.add('dragging');document.body.style.cursor='col-resize';
    e.preventDefault();
  });
  document.addEventListener('mousemove',e=>{
    if(!dragging)return;
    const dx=startX-e.clientX;
    let w=Math.max(180,Math.min(500,startW+dx));
    panel.style.width=w+'px';
  });
  document.addEventListener('mouseup',()=>{
    if(!dragging)return;dragging=false;
    handle.classList.remove('dragging');document.body.style.cursor='';
    setTimeout(()=>chart&&chart.resize(),10);
  });
})();

// ===== Events =====
$('rpTgl').addEventListener('click',()=>{
  if(!fullData.length){toast('请先加载股票');return;}
  if(rpMode){showAll();toast('已退出回放');}
  else{
    let si=fullData.length;
    if(chart&&savedZoom){const endPct=savedZoom.end/100;const totalLen=fullData.length+PAD_RIGHT;si=Math.min(fullData.length,Math.round(endPct*totalLen));}
    si=Math.max(20,Math.min(si,fullData.length));
    enterRp(si);toast('双击K线可选择起点 · 空格键播放');
  }
});
$('bPl').addEventListener('click',()=>{if(!rpMode||!fullData.length)return;playing?stopP():startP();});
$('bPv').addEventListener('click',()=>{if(rpMode){stopP();stepB();}});
$('bNx').addEventListener('click',()=>{if(rpMode){stopP();stepF();}});
$('prg').addEventListener('input',()=>{if(!rpMode)return;stopP();visibleLen=+$('prg').value;if(visibleLen<1)visibleLen=1;
  // 拖动滑块时也要更新dailyVisibleLen
  if(curKlt==='101'){
    dailyVisibleLen=visibleLen;
  }else if(fullData.length && cachedDailyData.length){
    const currDate=fullData[visibleLen-1].date;
    const dailyIdx=findClosestDateIndex(currDate, cachedDailyData);
    dailyVisibleLen=dailyIdx+1;
  }
  renderC(visibleLen,false);updPrg();if(visibleLen>0)updOHLC(fullData[visibleLen-1]);});
$('spd').addEventListener('change',()=>{playSpd=+$('spd').value;});
$('pg').addEventListener('click',e=>{const b=e.target.closest('.per');if(!b)return;$('pg').querySelector('.act').classList.remove('act');b.classList.add('act');const newKlt=b.dataset.k;
  // 如果有日线缓存，直接无刷新切换（任何周期之间都可以）
  if(curStock && cachedDailyData.length>0){
    try{
      // 第一步：确定目标日线位置（targetDailyVisibleLen）
      let targetDailyVisibleLen=dailyVisibleLen;
      let currentDate=null;

      // 先获取当前显示的日期，不管在哪个周期
      if(fullData.length){
        const currIdx=rpMode?Math.min(visibleLen-1,fullData.length-1):(fullData.length-1);
        if(currIdx>=0 && currIdx<fullData.length){
          currentDate=fullData[currIdx].date;
          // 如果还没有dailyVisibleLen，初始化它
          if(!dailyVisibleLen || dailyVisibleLen<=0){
            const dailyIdx=findClosestDateIndex(currentDate, cachedDailyData);
            targetDailyVisibleLen=dailyIdx+1;
          }else{
            targetDailyVisibleLen=dailyVisibleLen;
          }
        }
      }

      // 更新curKlt和dailyVisibleLen
      curKlt=newKlt;
      dailyVisibleLen=targetDailyVisibleLen;

      // 第二步：合成新周期数据（始终用完整数据，这样才能点击下一根）
      let fullPeriodData=[];
      if(newKlt==='101'){
        fullPeriodData=cachedDailyData.slice();
      }else if(newKlt==='102'){
        fullPeriodData=synthesizeWeeklyFromDaily(cachedDailyData);
      }else if(newKlt==='103'){
        fullPeriodData=synthesizeMonthlyFromDaily(cachedDailyData);
      }
      fullData=fullPeriodData;

      // 第三步：根据当前日线位置，找到新周期中对应的visibleLen
      if(currentDate && fullData.length){
        const newIdx=findClosestDateIndex(currentDate, fullData);
        visibleLen=newIdx+1;
      }else{
        visibleLen=fullData.length;
      }

      // 重新渲染
      buildPad(fullData.length);
      savedZoom=null;
      if(rpMode){
        renderC(visibleLen,true);
        if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
      }else{
        renderC(fullData.length,true);
        if(fullData.length)updOHLC(fullData[fullData.length-1]);
      }
      updSym();
      updPrg();
      console.log('无刷新切换周期成功:', newKlt==='101'?'日线':newKlt==='102'?'周线':'月线', '日期:', currentDate, '日线索引:', dailyVisibleLen, '周期索引:', visibleLen);
      return;
    }catch(err){
      console.warn('无刷新切换失败，回退到正常加载:', err);
      // 出错时确保curKlt也更新
      curKlt=newKlt;
    }
  }
  // 回退到原来的加载方式
  curKlt=newKlt;if(curStock)loadK();
});
$('bLt').addEventListener('click',()=>{if(!fullData.length)return;if(rpMode){showAll();toast('已退出回放');}else{savedZoom=null;renderC(fullData.length,true);toast('已跳到最新');}});
$('bRp').addEventListener('click',()=>{$('rightPanel').classList.toggle('collapsed');$('resizeH').style.display=$('rightPanel').classList.contains('collapsed')?'none':'';setTimeout(()=>chart&&chart.resize(),10);});
$('bFs').addEventListener('click',tFs);
$('bFav').addEventListener('click',toggleFav);
function tFs(){if(!document.fullscreenElement)document.documentElement.requestFullscreen().catch(()=>{});else document.exitFullscreen().catch(()=>{});}
document.addEventListener('keydown',e=>{
  if($('sMod').classList.contains('show'))return;
  if(e.target.tagName==='INPUT'||e.target.tagName==='SELECT')return;
  switch(e.key){
    case'/':e.preventDefault();openS();break;
    case' ':e.preventDefault();if(rpMode&&fullData.length)playing?stopP():startP();break;
    case'ArrowLeft':e.preventDefault();if(rpMode){stopP();stepB();}break;
    case'ArrowRight':e.preventDefault();if(rpMode){stopP();stepF();}break;
    case'Escape':if(rpMode){showAll();toast('已退出回放');}break;
    case'f':case'F':tFs();break;
  }
});

// ===== Init =====
loadSt();renderTab();refWl();
})();
</script>
