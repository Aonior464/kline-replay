<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>K线回放 - A股分析</title>
<script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
<script>if(typeof echarts==='undefined'){document.write('<script src="https://cdnjs.cloudflare.com/ajax/libs/echarts/5.5.0/echarts.min.js"><\/script>');}</script>
<style>
:root {
  --bg:#fff; --panel:#f8f9fd; --border:#e0e3eb; --border-l:#f0f2f5;
  --text:#131722; --text2:#787b86; --text3:#b2b5be;
  --accent:#2962ff; --accent-h:#1e53e5; --accent-bg:rgba(41,98,255,.08);
  --up:#ef5350; --dn:#26a69a; --hover:rgba(0,0,0,.04);
  --font:-apple-system,BlinkMacSystemFont,'Trebuchet MS','Microsoft YaHei','PingFang SC',sans-serif;
  --rp-w:280px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex;flex-direction:column;user-select:none}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ===== Toolbar ===== */
.toolbar{height:42px;background:var(--panel);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 8px;flex-shrink:0;z-index:10;gap:2px}
.tg{display:flex;align-items:center} .td{width:1px;height:20px;background:var(--border);margin:0 6px;flex-shrink:0}
.tb{height:32px;padding:0 10px;border-radius:6px;background:0;color:var(--text2);font-size:12px;display:flex;align-items:center;gap:5px;white-space:nowrap;transition:.15s}
.tb:hover{background:var(--hover);color:var(--text)} .tb svg{width:15px;height:15px;fill:currentColor;flex-shrink:0}
.sym-btn{font-size:14px;font-weight:600;color:var(--text);padding:0 12px} .sym-btn .sn{color:var(--text2);font-weight:400;font-size:12px;margin-left:4px}
.fav-btn svg{fill:var(--text3);transition:.15s} .fav-btn:hover svg{fill:#ffc107} .fav-btn.faved svg{fill:#ffc107}
.pi{display:flex;align-items:center;gap:8px;padding:0 8px;font-size:13px} .pi .pr{font-weight:700;font-size:16px} .pi .cg{font-size:12px;font-weight:500}
.pu{color:var(--up)} .pd{color:var(--dn)}
.per{height:28px;padding:0 10px;border-radius:6px;background:0;color:var(--text2);font-size:13px;font-weight:500;transition:.15s}
.per:hover{color:var(--text);background:var(--hover)} .per.act{color:var(--accent);background:var(--accent-bg)}
.ts{flex:1}

/* ===== Main ===== */
.main{flex:1;display:flex;min-height:0}
.chart-wrap{flex:1;min-width:0;display:flex;flex-direction:column}
.chart-area{flex:1;min-height:0;position:relative}
#kc{width:100%;height:100%}
.ohlc-bar{position:absolute;top:6px;left:10px;z-index:5;font-size:11px;display:flex;flex-wrap:wrap;gap:3px 10px;pointer-events:none}
.ohlc-bar span{white-space:nowrap} .ol{color:var(--text2)} .ov{font-weight:600} .ot{color:var(--text);font-weight:700;font-size:12px;margin-right:4px}
.rp-badge{position:absolute;top:6px;right:12px;z-index:5;background:var(--accent);color:#fff;padding:3px 10px;border-radius:4px;font-size:11px;font-weight:600;display:none;pointer-events:none}
.rp-badge.show{display:flex;align-items:center;gap:5px} .rp-badge svg{width:12px;height:12px;fill:#fff}
.chart-hint{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--text3);font-size:15px;gap:10px;z-index:3}
.chart-hint .hs{font-size:12px;color:#ccc} .chart-hint.hidden{display:none}
.chart-hint kbd{display:inline-block;padding:2px 8px;border:1px solid var(--border);border-radius:4px;background:var(--panel);font-family:var(--font);font-size:13px;color:var(--text2)}

/* ===== Replay Bar ===== */
.replay-bar{height:52px;background:var(--panel);border-top:1px solid var(--border);display:flex;align-items:center;padding:0 16px;gap:8px;flex-shrink:0}
.rp-tgl{height:34px;padding:0 14px;border-radius:8px;font-size:13px;font-weight:600;background:var(--bg);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;gap:6px;transition:.15s}
.rp-tgl:hover{border-color:var(--accent);color:var(--accent)} .rp-tgl.on{background:var(--accent);border-color:var(--accent);color:#fff} .rp-tgl.on:hover{background:var(--accent-h)}
.rp-tgl svg{width:15px;height:15px;fill:currentColor}
.rctl{display:flex;align-items:center;gap:4px}
.rb{width:34px;height:34px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text2);display:flex;align-items:center;justify-content:center;transition:.15s}
.rb:hover{border-color:var(--accent);color:var(--accent)} .rb.playing{background:var(--accent);border-color:var(--accent);color:#fff}
.rb:disabled{opacity:.2;cursor:default} .rb:disabled:hover{border-color:var(--border);color:var(--text2)} .rb svg{width:16px;height:16px;fill:currentColor}
.prg-w{flex:1;display:flex;align-items:center;gap:10px;min-width:120px}
.prg-w input[type=range]{flex:1;height:6px;accent-color:var(--accent);cursor:pointer} .prg-w input[type=range]:disabled{opacity:.3;cursor:default}
.prg-t{font-size:12px;color:var(--text2);white-space:nowrap;min-width:140px}
.spd-sel{height:34px;padding:0 10px;border-radius:8px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:12px;font-family:var(--font);cursor:pointer;outline:none} .spd-sel:disabled{opacity:.3}
.rp-keys{font-size:11px;color:var(--text3);display:flex;gap:12px;margin-left:8px}
.rp-keys kbd{display:inline-block;padding:1px 5px;border:1px solid var(--border);border-radius:3px;background:var(--bg);font-family:var(--font);font-size:10px;color:var(--text2)}

/* ===== Resize Handle ===== */
.resize-handle{width:5px;cursor:col-resize;background:transparent;flex-shrink:0;position:relative;z-index:5;transition:background .15s}
.resize-handle:hover,.resize-handle.dragging{background:var(--accent);opacity:.4}

/* ===== Right Panel ===== */
.right-panel{width:var(--rp-w);border-left:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;background:var(--bg);overflow:hidden;transition:none}
.right-panel.collapsed{width:0;border-left:none}
.rp-tabs{height:38px;display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
.rp-tab{flex:1;font-size:12px;font-weight:600;color:var(--text2);background:0;border-bottom:2px solid transparent;transition:.15s}
.rp-tab:hover{color:var(--text);background:var(--hover)} .rp-tab.act{color:var(--accent);border-bottom-color:var(--accent)}
.rp-body{flex:1;overflow-y:auto}

/* ===== Watchlist ===== */
.wl-hdr{height:34px;padding:0 12px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border-l)}
.wl-hdr span{font-size:11px;color:var(--text3)} .wl-btns{display:flex;gap:2px}
.wi{width:26px;height:26px;border-radius:6px;background:0;color:var(--text2);display:flex;align-items:center;justify-content:center;font-size:15px;transition:.12s}
.wi:hover{background:var(--hover);color:var(--accent)}
.wl-item{display:flex;align-items:center;padding:8px 12px;cursor:pointer;border-bottom:1px solid var(--border-l);transition:transform .2s,background .1s;position:relative;overflow:hidden}
.wl-item:hover{background:var(--hover)}
.wl-item.cur{background:var(--accent-bg);border-left:3px solid var(--accent);padding-left:9px}
.wl-inf{flex:1;min-width:0} .wl-c{font-size:12px;font-weight:600} .wl-n{font-size:10px;color:var(--text2);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.wl-p{text-align:right;flex-shrink:0} .wl-l{font-size:12px;font-weight:600} .wl-g{font-size:10px}
/* Swipe-to-delete */
.wl-item-inner{display:flex;align-items:center;width:100%}
.wl-e{padding:24px 12px;text-align:center;color:var(--text3);font-size:11px;line-height:1.8}
/* Watchlist groups */
.wl-groups{display:flex;align-items:center;gap:4px;padding:6px 10px;border-bottom:1px solid var(--border-l);overflow-x:auto;flex-shrink:0}
.wl-groups::-webkit-scrollbar{height:0}
.wl-gp{height:26px;padding:0 10px;border-radius:13px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;font-weight:500;white-space:nowrap;transition:.15s;position:relative;cursor:pointer;display:inline-flex;align-items:center;flex-shrink:0}
.wl-gp:hover{border-color:var(--accent);color:var(--accent)}
.wl-gp.act{background:var(--accent-bg);border-color:var(--accent);color:var(--accent)}
.wl-gp-add{width:26px;height:26px;border-radius:50%;background:0;border:1px dashed var(--border);color:var(--text3);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;transition:.15s}
.wl-gp-add:hover{border-color:var(--accent);color:var(--accent)}
.wl-gp-x{display:none;margin-left:4px;width:14px;height:14px;border-radius:50%;background:var(--text3);color:#fff;font-size:9px;line-height:14px;text-align:center;cursor:pointer;flex-shrink:0;transition:.12s}
.wl-gp:hover .wl-gp-x{display:inline-block}
.wl-gp-x:hover{background:#ef5350}

/* ===== Detail ===== */
.info-sec{padding:0 12px}
.info-title{font-size:11px;font-weight:600;color:var(--text);padding:10px 0 6px;border-bottom:1px solid var(--border-l)}
.info-row{display:flex;justify-content:space-between;padding:6px 0;font-size:11px;border-bottom:1px solid var(--border-l)}
.info-k{color:var(--text2)} .info-v{color:var(--text);font-weight:500}
.info-empty{padding:30px 12px;text-align:center;color:var(--text3);font-size:12px}
.rat-bar{display:flex;height:14px;border-radius:7px;overflow:hidden;margin:10px 0 6px} .rat-bar div{height:100%}
.rat-leg{display:flex;flex-wrap:wrap;gap:6px 14px;font-size:10px;color:var(--text2)} .rat-leg span{display:flex;align-items:center;gap:4px}
.rat-dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.rat-sum{margin-top:10px;font-size:11px;color:var(--text2);line-height:1.6;padding:8px 10px;background:var(--panel);border-radius:8px}

/* ===== Simulation Account ===== */
.sim-panel{padding:0}
.sim-summary{padding:10px 12px;border-bottom:1px solid var(--border-l);background:var(--panel)}
.sim-title{font-size:11px;font-weight:600;color:var(--text);padding:8px 12px 6px;border-bottom:1px solid var(--border-l)}
.sim-total{padding:6px 0 4px;display:flex;justify-content:space-between;align-items:baseline}
.sim-total-label{font-size:11px;color:var(--text2)}.sim-total-value{font-size:18px;font-weight:700}
.sim-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
.sim-k{color:var(--text2)} .sim-v{font-weight:500}
.sim-section{border-bottom:1px solid var(--border-l)}
.sim-empty{padding:16px 12px;text-align:center;color:var(--text3);font-size:11px}
.sim-pos-item{padding:8px 12px;border-bottom:1px solid var(--border-l);position:relative}
.sim-pos-hdr{display:flex;align-items:center;gap:6px;margin-bottom:4px}
.sim-pos-name{font-size:12px;font-weight:600} .sim-pos-code{font-size:10px;color:var(--text2)}
.sim-pos-info{display:grid;grid-template-columns:1fr 1fr;gap:1px}
.sim-pos-row{display:flex;justify-content:space-between;font-size:10px;padding:1px 0}
.sim-pos-row span:first-child{color:var(--text2)} .sim-pos-row span:last-child{font-weight:500}
.sim-sell-btn{height:22px;padding:0 10px;border-radius:4px;background:var(--dn);color:#fff;font-size:10px;font-weight:600;cursor:pointer;transition:.15s}
.sim-sell-btn:hover{opacity:.85}
.sim-sell-sm{height:20px;padding:0 8px;font-size:9px;font-weight:500;background:transparent;color:var(--dn);border:1px solid var(--dn)}
.sim-sell-sm:hover{background:var(--dn);color:#fff}
.sim-sell-btns{display:flex;gap:4px;padding:4px 12px 6px;justify-content:flex-end}
.sim-actions{padding:0}
.sim-action-info{display:flex;justify-content:space-between;align-items:center;padding:6px 12px 0;font-size:12px;font-weight:600}
.sim-cur-price{color:var(--accent)}
.sim-action-row{display:flex;gap:6px;padding:6px 12px 10px}
.sim-qty-sel{height:28px;padding:0 6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;font-family:var(--font);cursor:pointer;outline:none;flex:1}
.sim-buy-btn{height:28px;padding:0 14px;border-radius:6px;background:var(--up);color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;flex:1}
.sim-buy-btn:hover{opacity:.85}
.sim-sellall-btn{height:28px;padding:0 10px;border-radius:6px;background:var(--dn);color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:.15s;flex:1}
.sim-sellall-btn:hover{opacity:.85}
.sim-trade-item{padding:6px 12px;border-bottom:1px solid var(--border-l);font-size:11px}
.sim-trade-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:2px}
.sim-trade-date{color:var(--text2);font-size:10px}
.sim-dir-buy{color:var(--up);font-weight:600;font-size:10px}
.sim-dir-sell{color:var(--dn);font-weight:600;font-size:10px}
.sim-trade-body{display:flex;justify-content:space-between;align-items:center}
.sim-trade-name{font-weight:500}
.sim-trade-pnl{text-align:right;font-weight:600;font-size:10px;padding-top:1px}
.sim-reset{padding:12px;text-align:center;border-bottom:none}
.sim-reset-btn{height:26px;padding:0 16px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;transition:.15s}
.sim-reset-btn:hover{border-color:#ef5350;color:#ef5350}
.hdr-reset-btn{height:18px;padding:0 8px;border-radius:4px;background:transparent;border:1px solid var(--border);color:var(--text2);font-size:9px;cursor:pointer;transition:.15s}
.hdr-reset-btn:hover{border-color:#ef5350;color:#ef5350}
.sim-no-stock{padding:24px 12px;text-align:center;color:var(--text3);font-size:12px;line-height:1.8}

/* ===== Random Training ===== */
.train-panel{padding:0}
.train-start{padding:16px 12px;text-align:center;border-bottom:1px solid var(--border-l)}
.train-main-btn{width:100%;height:40px;border-radius:8px;background:var(--accent);color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.15s;display:flex;align-items:center;justify-content:center;gap:6px;border:none}
.train-main-btn:hover{background:var(--accent-h)}
.train-main-btn:disabled{opacity:.5;cursor:wait}
.train-opts{display:flex;flex-direction:column;gap:8px;margin-top:12px}
.train-opt{display:flex;align-items:center;justify-content:space-between;font-size:12px;color:var(--text2)}
.train-opt label{display:flex;align-items:center;gap:6px;cursor:pointer}
.train-opt input[type=checkbox]{accent-color:var(--accent);width:14px;height:14px;cursor:pointer}
.train-opt select{height:26px;padding:0 6px;border-radius:6px;border:1px solid var(--border);background:var(--bg);color:var(--text);font-size:11px;font-family:var(--font);cursor:pointer;outline:none}
.train-current{border-bottom:1px solid var(--border-l)}
.train-cur-title{font-size:11px;font-weight:600;color:var(--text);padding:8px 12px 6px;border-bottom:1px solid var(--border-l)}
.train-cur-body{padding:8px 12px}
.train-cur-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
.train-cur-row span:first-child{color:var(--text2)} .train-cur-row span:last-child{font-weight:500}
.train-cur-actions{display:flex;gap:6px;padding:8px 12px 10px}
.train-reveal-btn{flex:1;height:30px;border-radius:6px;background:var(--bg);border:1px solid var(--accent);color:var(--accent);font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.train-reveal-btn:hover{background:var(--accent-bg)}
.train-next-btn{flex:1;height:30px;border-radius:6px;background:var(--accent);border:none;color:#fff;font-size:11px;font-weight:600;cursor:pointer;transition:.15s}
.train-next-btn:hover{background:var(--accent-h)}
.train-stats{border-bottom:1px solid var(--border-l)}
.train-stats-title{font-size:11px;font-weight:600;color:var(--text);padding:8px 12px 6px;border-bottom:1px solid var(--border-l)}
.train-stats-body{padding:8px 12px}
.train-stat-row{display:flex;justify-content:space-between;padding:3px 0;font-size:11px}
.train-stat-row span:first-child{color:var(--text2)} .train-stat-row span:last-child{font-weight:500}
.train-stat-empty{padding:16px 12px;text-align:center;color:var(--text3);font-size:11px}
.train-reset{padding:12px;text-align:center}
.train-reset-btn{height:26px;padding:0 16px;border-radius:6px;background:var(--bg);border:1px solid var(--border);color:var(--text2);font-size:11px;cursor:pointer;transition:.15s}
.train-reset-btn:hover{border-color:#ef5350;color:#ef5350}
.train-blind-tag{display:inline-block;padding:1px 6px;border-radius:4px;background:#ffc107;color:#000;font-size:9px;font-weight:600;margin-left:4px}
.train-trade-section{margin:8px 0;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border-l);border-radius:6px}
.train-trade-hdr{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:6px;color:var(--text-s)}
.train-trade-row{display:flex;gap:6px;align-items:center;margin-bottom:6px}
.train-trade-row .sim-qty-sel{flex:1}
.train-trade-row .sim-buy-btn,.train-trade-row .sim-sellall-btn{padding:4px 10px;font-size:11px}
.train-pos-row{display:flex;justify-content:space-between;align-items:center;gap:4px;padding:4px 0;font-size:11px;border-top:1px solid var(--border-l)}
.train-pos-sell-btns{display:flex;gap:4px;justify-content:flex-end;padding:2px 0 4px}
.train-pos-sell-btns .sim-sell-btn{padding:2px 8px;font-size:10px}
.train-cash-row{font-size:10px;color:var(--text-s);text-align:right;padding-top:4px}

/* ===== Search Modal ===== */
.sm{position:fixed;inset:0;z-index:100;display:none;align-items:flex-start;justify-content:center;padding-top:60px}
.sm.show{display:flex} .sm-bk{position:absolute;inset:0;background:rgba(0,0,0,.18)}
.sm-d{position:relative;width:460px;max-height:450px;background:var(--bg);border:1px solid var(--border);border-radius:12px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 16px 48px rgba(0,0,0,.1)}
.sm-iw{display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid var(--border);gap:10px}
.sm-iw svg{width:18px;height:18px;fill:var(--text3);flex-shrink:0}
.sm-i{flex:1;background:0;border:0;outline:0;color:var(--text);font-size:15px;font-family:var(--font)} .sm-i::placeholder{color:var(--text3)}
.sm-r{flex:1;overflow-y:auto}
.sm-sec{padding:8px 16px 4px;font-size:10px;color:var(--text3);letter-spacing:.5px}
.si{display:flex;align-items:center;padding:8px 16px;cursor:pointer;transition:.1s} .si:hover,.si.fc{background:var(--hover)}
.si .c{font-size:14px;font-weight:600;color:var(--text);min-width:70px} .si .n{font-size:13px;color:var(--text2);flex:1}
.si .m{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--accent-bg);color:var(--accent);font-weight:500}

.ld{position:absolute;top:0;left:0;right:0;height:2px;background:var(--accent);z-index:50;transform-origin:left;animation:lp 1.2s ease-in-out infinite;display:none}
.ld.show{display:block}@keyframes lp{0%{transform:scaleX(0)}50%{transform:scaleX(.6)}100%{transform:scaleX(1);opacity:0}}
.toast{position:fixed;bottom:64px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:10px 20px;border-radius:8px;font-size:12px;z-index:200;opacity:0;transition:.3s;pointer-events:none;box-shadow:0 4px 16px rgba(0,0,0,.15)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
</style>
</head>
<body>

<div class="toolbar">
  <div class="tg"><button class="tb sym-btn" id="symBtn" title="搜索 (/)"><svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg><span id="sc">搜索股票</span><span class="sn" id="sn"></span></button></div>
  <div class="td"></div>

function jsonp(url){return new Promise((ok,no)=>{
  const cb='__k'+(++jc)+'_'+Date.now();
  const s=document.createElement('script');
  const cl=()=>{try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);};
  window[cb]=d=>{cl();ok(d)};
  s.onerror=()=>{cl();no(new Error('请求失败'))};

})}

// 检测本地后端是否可用
async function checkBackend(){
  if(backendAvailable!==null)return backendAvailable;
  try{
    const controller=new AbortController();
    const timeout=setTimeout(()=>controller.abort(),2000);
    const res=await fetch(BACKEND_URL+'/api/health',{signal:controller.signal});
    clearTimeout(timeout);

      console.log('✓ 本地后端可用');

    }
  }catch(e){}
  backendAvailable=false;
  console.log('✗ 本地后端不可用，使用东方财富API');
  return false;
}

// 兼容不同callback参数名的jsonp
function jsonpWithCallbackParam(url, callbackParam='cb'){
  return new Promise((ok,no)=>{
    const cb='__k'+(++jc)+'_'+Date.now();
    const s=document.createElement('script');
    const cl=()=>{try{delete window[cb];}catch(e){}if(s.parentNode)s.parentNode.removeChild(s);};
    window[cb]=d=>{cl();ok(d)};
    s.onerror=()=>{cl();no(new Error('请求失败'))};
    let sep=url.includes('?')?'&':'?';
    s.src=url+sep+callbackParam+'='+cb;
    document.head.appendChild(s);
    let to=setTimeout(()=>{cl();no(new Error('超时'))},12000);
  });
}

// 多主机尝试jsonp
async function tryJsonp(hosts, pathFn, callbackParam='cb'){
  const key=hosts[0];
  const sorted=[...hosts];
  if(lastOkHost[key]&&sorted.indexOf(lastOkHost[key])>0){
    sorted.splice(sorted.indexOf(lastOkHost[key]),1);
    sorted.unshift(lastOkHost[key]);
  }
  for(let i=0;i<sorted.length;i++){
    const url='https://'+sorted[i]+pathFn();
    console.log('请求:', sorted[i], url);
    try{
      const d=await jsonpWithCallbackParam(url, callbackParam);
      lastOkHost[key]=sorted[i];
      console.log('成功:', sorted[i]);
      return d;
    }catch(e){
      console.warn('失败:', sorted[i], e.message);
      if(i<sorted.length-1)await new Promise(r=>setTimeout(r,200));
    }
  }
  return null;
}

async function fetchBackendKline(stock){

  const fqt=1;
  try{
    const res=await fetch(BACKEND_URL+'/api/stock/kline?secid='+encodeURIComponent(secid)+'&klt='+klt+'&fqt='+fqt+'&beg=0&end=20500101');
    if(!res.ok)return null;
    return await res.json();
  }catch(e){
    console.warn('本地后端K线请求失败:',e);
    return null;
  }
}

// 东方财富获取K线
async function fetchEastmoneyKline(stock){
  // 优先尝试本地后端
  if(await checkBackend()){
    const data=await fetchBackendKline(stock);
    if(data&&data.data)return data;
  }
  // 降级到东方财富
  const secid=stock.secid;
  const klt='101'; // 始终获取日K，客户端聚合周K/月K
  const fqt=1; // 前复权

  const pathFn=()=>'/api/qt/stock/kline/get?secid='+secid+'&fields1=f1,f2,f3,f4,f5,f6&fields2=f51,f52,f53,f54,f55,f56,f57,f58,f59,f60,f61&klt='+klt+'&fqt='+fqt+'&beg=0&end=20500101';
  const data=await tryJsonp(HOSTS_KLINE, pathFn, 'callback');
  return data;
}

async function loadK(restoreDate, restoreRp){
  if(!curStock)return;exitRp();ld(true);$('chHint').classList.add('hidden');
  console.log('loadK: 加载股票', curStock);

  // 使用东方财富API（始终获取日K）
  const data=await fetchEastmoneyKline(curStock);
  if(!data||!data.data||!data.data.klines||!data.data.klines.length){
    toast('未获取到K线数据，请检查网络');
    console.error('东方财富API无数据:', data);
    ld(false);
    return;
  }

  try{
    console.log('数据加载完成:', data.data.klines.length+'条');
    parseD(data.data);
    dailyVisibleLen=dailyData.length;
    fullData=toViewData(curKlt,dailyVisibleLen);
    visibleLen=fullData.length;
    updSym();
    initChart();
    if(restoreDate && dailyData.length){
      const dailyIdx=findDailyDateIdx(restoreDate);
      if(restoreRp){
        savedZoom=null;
        dailyVisibleLen=dailyIdx+1;
        fullData=toViewData(curKlt,dailyVisibleLen);
        visibleLen=fullData.length;
        enterRp();
      } else {
        showAll();
      }
    } else {
      showAll();
    }
    hlWl();
    if(curTab==='sim')renderSim();
  }catch(e){console.error('loadK render error:',e);toast('渲染失败: '+e.message);}
  ld(false);
}
function parseD(r){
  dailyData=r.klines.map(l=>{const p=l.split(',');return{date:p[0],open:+p[1],close:+p[2],high:+p[3],low:+p[4],vol:+p[5],amt:+p[6],amp:p[7],chg:+p[8],chgA:+p[9],turn:p[10]};});
}
// 在新周期数据中查找最接近目标日期的索引（<=targetDate的最后一条）
function findDateIdx(target){
  let best=0;
  for(let i=0;i<fullData.length;i++){
    if(fullData[i].date<=target)best=i;else break;
  }
  return best;
}
// 在dailyData中查找最接近目标日期的索引
function findDailyDateIdx(target){
  let best=0;
  for(let i=0;i<dailyData.length;i++){
    if(dailyData[i].date<=target)best=i;else break;
  }
  return best;
}
// ===== 周期聚合 =====
function getISOWeekKey(dateStr){
  const d=new Date(dateStr);
  const tmp=new Date(d.getTime());
  tmp.setDate(tmp.getDate()+3-((tmp.getDay()+6)%7));
  const yearStart=new Date(tmp.getFullYear(),0,4);
  const weekNum=1+Math.round(((tmp-yearStart)/86400000-3+((yearStart.getDay()+6)%7))/7);
  return tmp.getFullYear()+'-W'+String(weekNum).padStart(2,'0');
}
function getMonthKey(dateStr){return dateStr.substring(0,7);}
function aggregateCandles(dailySlice,keyFn){
  if(!dailySlice.length)return[];
  const groups=[];let curKey=null,cur=null;
  for(const d of dailySlice){
    const key=keyFn(d.date);
    if(key!==curKey){
      if(cur)groups.push(cur);
      curKey=key;
      cur={date:d.date,open:d.open,close:d.close,high:d.high,low:d.low,vol:d.vol,amt:d.amt,chg:0,chgA:0,amp:'0',turn:'-'};
    }else{
      cur.date=d.date;cur.close=d.close;
      cur.high=Math.max(cur.high,d.high);cur.low=Math.min(cur.low,d.low);
      cur.vol+=d.vol;cur.amt+=d.amt;
    }
  }
  if(cur)groups.push(cur);
  // 计算涨跌幅
  for(let i=0;i<groups.length;i++){
    const g=groups[i];
    const prev=i>0?groups[i-1].close:g.open;
    g.chg=prev?+((g.close-prev)/prev*100).toFixed(2):0;
    g.chgA=+(g.close-prev).toFixed(2);
    g.amp=prev?((g.high-g.low)/prev*100).toFixed(2):'0';
  }
  return groups;
}
function toViewData(klt,dailyLen){
  const slice=dailyData.slice(0,dailyLen);
  if(klt==='101')return slice;
  if(klt==='102')return aggregateCandles(slice,getISOWeekKey);
  if(klt==='103')return aggregateCandles(slice,getMonthKey);
  return slice;
}
// 获取当前zoom对应的日期范围
function getZoomDateRange(){
  if(!savedZoom||!fullData.length)return null;
  const totalLen=fullData.length+PAD_RIGHT;
  const si=Math.max(0,Math.floor(savedZoom.start/100*totalLen));
  const ei=Math.min(fullData.length-1,Math.floor(savedZoom.end/100*totalLen));
  if(si>=fullData.length||ei<0)return null;
  return{startDate:fullData[Math.min(si,fullData.length-1)].date,endDate:fullData[Math.min(ei,fullData.length-1)].date};
}
// 根据日期范围恢复zoom位置
function restoreZoomByDate(range){
  if(!range||!fullData.length){savedZoom=null;return;}
  const totalLen=fullData.length+PAD_RIGHT;
  let si=0,ei=fullData.length-1;
  for(let i=0;i<fullData.length;i++){
    if(fullData[i].date<=range.startDate)si=i;
    if(fullData[i].date<=range.endDate)ei=i;
  }
  savedZoom={start:Math.max(0,(si/totalLen)*100),end:Math.min(100,((ei+PAD_RIGHT*0.25)/totalLen)*100)};
}
// 构建带右侧空白的数据
function buildPad(len){
  const src=fullData.slice(0,len);
  padData={
    dates: src.map(d=>d.date).concat(Array(PAD_RIGHT).fill('')),
    ohlc: src.map(d=>[d.open,d.close,d.low,d.high]).concat(Array(PAD_RIGHT).fill('-')),
    vols: src.map(d=>d.vol).concat(Array(PAD_RIGHT).fill('-')),
    realLen: len
  };
}

      const ratings=d2.data.list;

      const prev=dailyData.length>1?dailyData[dailyData.length-2]:L;

        open:L.open.toFixed(2),

function getTradeMarkers(dataLen){
  if(!simAccount||!simAccount.history.length||!curStock||!fullData.length)return[];
  // 构建日期范围索引: 对于聚合K线，交易日期落在(prevDate, curDate]范围内即匹配
  // 对于日K，退化为精确匹配
  // Popover speech-bubble paths (arrow points toward the candle)
  const buyPath='path://M-6,0L-2,0L0,-3L2,0L6,0Q8,0,8,2L8,9Q8,11,6,11L-6,11Q-8,11,-8,9L-8,2Q-8,0,-6,0Z';
  const sellPath='path://M-6,0L-2,0L0,3L2,0L6,0Q8,0,8,-2L8,-9Q8,-11,6,-11L-6,-11Q-8,-11,-8,-9L-8,-2Q-8,0,-6,0Z';
  const markers=[];
  simAccount.history.forEach(t=>{
    if(t.code!==curStock.code)return;
    // 范围匹配: 找到第一个date>=t.date的K线
    let idx=-1;
    for(let i=0;i<dataLen;i++){
      if(fullData[i].date>=t.date){idx=i;break;}
    }
    if(idx<0)return;
    const d=fullData[idx];
    if(t.direction==='buy'){
      markers.push({coord:[idx,d.low],symbol:buyPath,symbolSize:[20,16],symbolOffset:[0,12],itemStyle:{color:'#26a69a',shadowColor:'rgba(0,0,0,.12)',shadowBlur:3,shadowOffsetY:1},label:{show:true,position:'inside',formatter:'B',fontSize:9,fontWeight:'bold',color:'#fff',offset:[0,2]}});
    }else{
      markers.push({coord:[idx,d.high],symbol:sellPath,symbolSize:[20,16],symbolOffset:[0,-12],itemStyle:{color:'#ef5350',shadowColor:'rgba(0,0,0,.12)',shadowBlur:3,shadowOffsetY:-1},label:{show:true,position:'inside',formatter:'S',fontSize:9,fontWeight:'bold',color:'#fff',offset:[0,-2]}});
    }
  });
  return markers;
}

function stepF(){
  if(dailyVisibleLen>=dailyData.length){stopP();return;}
  if(curKlt==='101'){
    dailyVisibleLen++;
  }else{
    // 周K/月K: 步进一个完整周期
    const keyFn=curKlt==='102'?getISOWeekKey:getMonthKey;
    const curKey=keyFn(dailyData[dailyVisibleLen-1].date);
    // 先走完当前周期剩余的天
    while(dailyVisibleLen<dailyData.length&&keyFn(dailyData[dailyVisibleLen].date)===curKey)dailyVisibleLen++;
    // 再包含下一个完整周期
    if(dailyVisibleLen<dailyData.length){
      const nextKey=keyFn(dailyData[dailyVisibleLen].date);
      while(dailyVisibleLen<dailyData.length&&keyFn(dailyData[dailyVisibleLen].date)===nextKey)dailyVisibleLen++;
    }
  }
  fullData=toViewData(curKlt,dailyVisibleLen);visibleLen=fullData.length;
  buildPad(visibleLen);updPrg();
  // 智能滚动: 检查最新K线是否快到视口右边缘
  if(savedZoom){
    const totalLen=visibleLen+PAD_RIGHT;
    const lastPct=(visibleLen/totalLen)*100;
    // 如果最新K线超过当前视口end的90%位置,向右平移
    const viewRange=savedZoom.end-savedZoom.start;
    const threshold=savedZoom.start+viewRange*0.88;
    if(lastPct>threshold){
      const shift=(1/totalLen)*100;
      savedZoom.start+=shift;savedZoom.end+=shift;
    }
  }
  renderC(visibleLen,false);
  if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
  if(!playing&&curTab==='sim')renderSim();
  if(!playing&&curTab==='train'&&trainSession)renderTrain();
}
function stepB(){
  if(dailyVisibleLen<=1)return;
  if(curKlt==='101'){
    dailyVisibleLen--;
  }else{
    // 周K/月K: 回退一个完整周期
    const keyFn=curKlt==='102'?getISOWeekKey:getMonthKey;
    const curKey=keyFn(dailyData[dailyVisibleLen-1].date);
    // 移除当前周期的所有天
    while(dailyVisibleLen>1&&keyFn(dailyData[dailyVisibleLen-1].date)===curKey)dailyVisibleLen--;
  }
  fullData=toViewData(curKlt,dailyVisibleLen);visibleLen=fullData.length;
  buildPad(visibleLen);updPrg();renderC(visibleLen,false);
  if(visibleLen>0)updOHLC(fullData[visibleLen-1]);
  if(!playing&&curTab==='sim')renderSim();
  if(!playing&&curTab==='train'&&trainSession)renderTrain();
}

function getSimPrice(){
  if(!curStock||!dailyData.length)return null;
  const idx=rpMode?Math.min(dailyVisibleLen,dailyData.length)-1:dailyData.length-1;

}
function simBuy(shares){
  if(!curStock||!dailyData.length){toast('请先加载股票');return;}
  const d=getSimPrice();if(!d)return;
  const cost=d.close*shares;
  if(cost>simAccount.cash){toast('资金不足 (需'+cost.toFixed(2)+', 可用'+simAccount.cash.toFixed(2)+')');return;}
  simAccount.cash-=cost;
  simAccount.positions.push({id:++simIdCounter,code:curStock.code,name:curStock.name,secid:curStock.secid,shares:shares,buyPrice:d.close,buyDate:d.date});
  simAccount.history.push({id:++simIdCounter,code:curStock.code,name:curStock.name,direction:'buy',shares:shares,price:d.close,date:d.date,pnl:null,pnlPct:null});
  saveSim();const dn=(trainSession&&trainSession.blind&&!trainSession.revealed)?'???':curStock.name;toast('买入 '+dn+' '+shares+'股 @'+d.close.toFixed(2));
  if(chart&&fullData.length){renderC(visibleLen,false);}
  if(curTab==='sim')renderSim();
}
function simSell(posId,sellShares){
  if(!curStock||!dailyData.length)return;
  const d=getSimPrice();if(!d)return;
  const idx=simAccount.positions.findIndex(p=>p.id===posId);if(idx<0)return;
  const pos=simAccount.positions[idx];
  const shares=sellShares&&sellShares<pos.shares?sellShares:pos.shares;
  const revenue=d.close*shares;
  const pnl=revenue-pos.buyPrice*shares;
  const pnlPct=(d.close-pos.buyPrice)/pos.buyPrice*100;
  simAccount.cash+=revenue;
  if(shares>=pos.shares){simAccount.positions.splice(idx,1);}
  else{pos.shares-=shares;}
  simAccount.history.push({id:++simIdCounter,code:pos.code,name:pos.name,direction:'sell',shares:shares,price:d.close,date:d.date,buyPrice:pos.buyPrice,pnl:pnl,pnlPct:pnlPct});
  saveSim();
  const sign=pnl>=0?'+':'';
  const sn2=(trainSession&&trainSession.blind&&!trainSession.revealed)?'???':pos.name;
  toast('卖出 '+sn2+' '+shares+'股 @'+d.close.toFixed(2)+' '+sign+pnl.toFixed(2));
  if(chart&&fullData.length){renderC(visibleLen,false);}
  if(curTab==='sim')renderSim();
  if(curTab==='train')renderTrain();
}
function simSellByCode(code,sellShares){
  if(!curStock||!dailyData.length)return;
  const d=getSimPrice();if(!d)return;
  const posArr=simAccount.positions.filter(p=>p.code===code);
  if(!posArr.length)return;
  let remain=sellShares;
  let totalPnl=0,totalShares=0,totalCost=0;
  for(let i=0;i<posArr.length&&remain>0;i++){
    const pos=posArr[i];
    const qty=Math.min(remain,pos.shares);
    const revenue=d.close*qty;
    const cost=pos.buyPrice*qty;
    totalPnl+=revenue-cost;totalShares+=qty;totalCost+=cost;
    simAccount.cash+=revenue;
    if(qty>=pos.shares){const idx=simAccount.positions.indexOf(pos);if(idx>=0)simAccount.positions.splice(idx,1);}
    else{pos.shares-=qty;}
    remain-=qty;
  }
  const avgCost=totalShares>0?totalCost/totalShares:0;
  const pnlPct=avgCost>0?(d.close-avgCost)/avgCost*100:0;
  simAccount.history.push({id:++simIdCounter,code:code,name:posArr[0].name,direction:'sell',shares:totalShares,price:d.close,date:d.date,buyPrice:avgCost,pnl:totalPnl,pnlPct:pnlPct});
  saveSim();
  const sign=totalPnl>=0?'+':'';
  const sn2=(trainSession&&trainSession.blind&&!trainSession.revealed)?'???':posArr[0].name;
  toast('卖出 '+sn2+' '+totalShares+'股 @'+d.close.toFixed(2)+' '+sign+totalPnl.toFixed(2));
  if(chart&&fullData.length){renderC(visibleLen,false);}
  if(curTab==='sim')renderSim();
  if(curTab==='train')renderTrain();
}
function simSellAll(){
  if(!curStock||!dailyData.length)return;
  const cur=simAccount.positions.filter(p=>p.code===curStock.code);
  if(!cur.length){toast('无持仓可卖出');return;}
  cur.forEach(p=>simSell(p.id));
}
function calcSellShares(total,ratio){
  const s=Math.floor(total*ratio/100)*100;
  return s<100?0:s;
}
function renderSim(){

  // 如果正在训练且盲盒模式，用训练中的股票作为simBuy/sell的上下文
  const isBlind=trainSession&&trainSession.blind&&!trainSession.revealed;
  const d=getSimPrice();
  const curPrice=d?d.close:null;
  // 计算持仓市值
  let posValue=0;
  simAccount.positions.forEach(p=>{
    if(curStock&&p.code===curStock.code&&curPrice)posValue+=curPrice*p.shares;
    else posValue+=p.buyPrice*p.shares;
  });
  const totalAssets=simAccount.cash+posValue;
  const totalPnl=totalAssets-SIM_INITIAL;
  const totalPnlPct=totalPnl/SIM_INITIAL*100;
  const pc=totalPnl>=0?'pu':'pd';

function loadTrainStats(){
  try{
    const saved=JSON.parse(localStorage.getItem('trainStats'));
    if(saved&&Array.isArray(saved.sessions)){trainStats=saved;}
    else trainStats={sessions:[],totalCount:0,winCount:0};
  }catch(e){trainStats={sessions:[],totalCount:0,winCount:0};}
}
function saveTrainStats(){localStorage.setItem('trainStats',JSON.stringify(trainStats));}

async function fetchTrainPool(){
  // 内存缓存有效
  if(trainStockPool.length&&Date.now()<trainPoolExpiry)return trainStockPool;
  // localStorage缓存（24小时）
  try{
    const cached=JSON.parse(localStorage.getItem('trainPool'));
    if(cached&&cached.data&&cached.data.length&&cached.expiry>Date.now()){
      trainStockPool=cached.data;
      trainPoolExpiry=cached.expiry;
      console.log('股票池从缓存加载:',trainStockPool.length,'只');
      return trainStockPool;
    }
  }catch(e){}
  // 优先后端API
  if(await checkBackend()){
    try{
      const res=await fetch(BACKEND_URL+'/api/train/pool');
      if(res.ok){
        const json=await res.json();
        if(json.data&&json.data.length){
          trainStockPool=json.data;
          trainPoolExpiry=Date.now()+86400000;
          localStorage.setItem('trainPool',JSON.stringify({data:trainStockPool,expiry:trainPoolExpiry}));
          console.log('股票池从后端加载:',trainStockPool.length,'只');
          return trainStockPool;
        }
      }
    }catch(e){console.warn('后端股票池请求失败:',e);}
  }
  toast('获取股票池失败，请确保后端服务已启动');
  return null;
}

async function startRandomTrain(){
  const blindCheck=$('trainBlind');
  const histSel=$('trainHist');
  const blind=blindCheck?blindCheck.checked:trainBlindPref;
  trainBlindPref=blind;
  const historyDays=histSel?+histSel.value:60;

  // 获取股票池
  const btn=$('trainStartBtn');
  if(btn){btn.disabled=true;btn.textContent='加载股票池...';}
  const pool=await fetchTrainPool();
  if(!pool||!pool.length){if(btn){btn.disabled=false;btn.textContent='获取随机训练';}toast('股票池为空');return;}

  // 随机选股
  const stock=pool[Math.floor(Math.random()*pool.length)];
  if(btn)btn.textContent='加载K线数据...';

  // 结束之前的训练
  if(trainSession)endTrain(true);

  // 设置curStock并加载数据
  curStock={code:stock.code,name:stock.name,secid:stock.secid,mkt:stock.mkt};
  exitRp(true);ld(true);$('chHint').classList.add('hidden');
  const data=await fetchEastmoneyKline(curStock);
  if(!data||!data.data||!data.data.klines||!data.data.klines.length){
    toast('K线数据加载失败，换一只试试');ld(false);
    if(btn){btn.disabled=false;btn.textContent='获取随机训练';}
    return;
  }
  parseD(data.data);
  dailyVisibleLen=dailyData.length;
  fullData=toViewData(curKlt,dailyVisibleLen);
  visibleLen=fullData.length;

  // 随机选起始位置
  const minIdx=Math.max(historyDays,60);
  const maxIdx=dailyData.length-120;
  if(maxIdx<=minIdx){
    toast('该股票数据不足，换一只');ld(false);
    if(btn){btn.disabled=false;btn.textContent='获取随机训练';}
    return;
  }
  const startIdx=minIdx+Math.floor(Math.random()*(maxIdx-minIdx));

  // 创建训练会话
  trainSession={
    stockCode:stock.code,
    stockName:stock.name,
    stockSecid:stock.secid,
    stockMkt:stock.mkt,
    stockCap:null,
    stockIndex:stock.index||'',
    startDate:dailyData[startIdx-1].date,
    startIdx:startIdx,
    blind:blind,
    revealed:false,
    startCash:simAccount?simAccount.cash:SIM_INITIAL,
    startPositions:simAccount?simAccount.positions.filter(p=>p.code===stock.code).length:0,
    startHistoryLen:simAccount?simAccount.history.length:0
  };

  // 初始化图表并进入回放
  updSym();initChart();
  savedZoom=null;
  enterRp(startIdx);
  ld(false);

  // 切到模拟账户方便操作（但保持train tab状态）
  toast(blind?'随机训练已开始 · 盲盒模式':'随机训练: '+stock.name);
  if(btn){btn.disabled=false;btn.textContent='获取随机训练';}
  if(curTab==='train')renderTrain();
  hlWl();
  // 异步获取市值
  fetchStockCap(stock.code);
}

async function fetchStockCap(code){
  try{

    if(!res.ok)return;
    const json=await res.json();

// 计算训练期间基于买卖交易的盈亏（非总资金盈亏）
function calcTrainTradePnl(){
  if(!simAccount||!trainSession)return{pnl:0,pnlPct:0,trades:0,totalCost:0};
  const code=trainSession.stockCode;
  // 按训练开始时的history索引截取，避免日期比较问题
  const startIdx=trainSession.startHistoryLen||0;
  const recent=simAccount.history.slice(startIdx).filter(h=>h.code===code);
  const sells=recent.filter(h=>h.direction==='sell');
  const buys=recent.filter(h=>h.direction==='buy');
  // 已卖出的交易：已实现盈亏
  let realizedPnl=sells.reduce((s,h)=>s+(h.pnl||0),0);
  let totalCost=sells.reduce((s,h)=>s+(h.buyPrice||h.price)*h.shares,0);
  // 未卖出持仓：浮动盈亏
  const d=getSimPrice();
  simAccount.positions.filter(p=>p.code===code).forEach(p=>{
    const curPrice=d?d.close:p.buyPrice;
    totalCost+=p.buyPrice*p.shares;
    realizedPnl+=(curPrice-p.buyPrice)*p.shares;
  });
  const pnlPct=totalCost>0?(realizedPnl/totalCost*100):0;
  return{pnl:realizedPnl,pnlPct,trades:buys.length+sells.length,totalCost};
}

function endTrain(silent){
  if(!trainSession)return;
  // 基于交易盈亏结算
  const tp=calcTrainTradePnl();
  const pnlPct=tp.pnlPct;
  const trades=tp.trades;

  const session={
    date:new Date().toISOString().substring(0,10),
    code:trainSession.stockCode,
    name:trainSession.stockName,
    pnlPct:+pnlPct.toFixed(2),
    trades:trades,
    blind:trainSession.blind
  };
  trainStats.sessions.unshift(session);
  trainStats.totalCount++;
  if(pnlPct>0)trainStats.winCount++;
  // 只保留最近100条
  if(trainStats.sessions.length>100)trainStats.sessions=trainStats.sessions.slice(0,100);
  saveTrainStats();

  if(!silent)toast('训练结束 · '+(pnlPct>=0?'+':'')+pnlPct.toFixed(2)+'%');
  trainSession=null;
  updSym();
  if(curTab==='train')renderTrain();
}

  const startBtn=$('trainStartBtn');
  if(startBtn)startBtn.addEventListener('click',startRandomTrain);
  const revealBtn=$('trainRevealBtn');
  if(revealBtn)revealBtn.addEventListener('click',revealTrain);
  const nextBtn=$('trainNextBtn');
  if(nextBtn)nextBtn.addEventListener('click',()=>{endTrain();startRandomTrain();});
  // 训练面板内嵌交易按钮
  const tBuyBtn=$('trainBuyBtn');
  if(tBuyBtn)tBuyBtn.addEventListener('click',()=>{simBuy(+$('trainQty').value);if(curTab==='train')renderTrain();});
  const tSellAllBtn=$('trainSellAllBtn');
  if(tSellAllBtn)tSellAllBtn.addEventListener('click',()=>{simSellAll();});
  body.querySelectorAll('.train-sell-single').forEach(btn=>{
    btn.addEventListener('click',()=>{
      const code=btn.dataset.code;const ratio=+btn.dataset.ratio;
      const totalShares=simAccount.positions.filter(p=>p.code===code).reduce((s,p)=>s+p.shares,0);
      if(ratio>=1){simSellByCode(code,totalShares);}
      else{const qty=calcSellShares(totalShares,ratio);if(qty<=0){toast('持仓不足，无法部分卖出');return;}simSellByCode(code,qty);}
    });
  });
  const resetBtn=$('trainResetBtn');
  if(resetBtn)resetBtn.addEventListener('click',()=>{
    trainStats={sessions:[],totalCount:0,winCount:0};saveTrainStats();renderTrain();toast('统计已清空');
  });
}

// ===== Init =====
loadSt();loadSim();loadTrainStats();renderTab();refWl();
})();
</script>
</body>
</html>
